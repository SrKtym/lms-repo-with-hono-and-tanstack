services:
  server:
    container_name: lms-server
    build:
      # ビルド対象をルートディレクトリ（docker-compose.ymlのあるディレクトリから見た場合../）に設定
      context: ..
      # このブロックに限りカレントディレクトリはルートディレクトリを指す
      dockerfile: apps/server/Dockerfile.dev
    ports:
      - 3000:3000
    volumes:
      # ホストのルートディレクトリをコンテナにマウント
      - ..:/lms-repo
      # node_modulesをホストと分離してコンテナにマウント
      - node_modules:/lms-repo/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/lmsdb
      NODE_ENV: development
      GCS_EMULATOR_HOST: http://fake-gcs:8000
      GCS_BUCKET_NAME: dummy-storage-bucket
    depends_on:
      - db

  web:
    container_name: lms-web
    build:
      # ビルド対象をルートディレクトリ（docker-compose.ymlのあるディレクトリから見た場合../）に設定
      context: ..
      # このブロックに限りカレントディレクトリはルートディレクトリを指す
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - 3001:3001
    volumes:
      # ホストのルートディレクトリをコンテナにマウント
      - ..:/lms-repo
      # node_modulesをホストと分離してコンテナにマウント
      - node_modules:/lms-repo/node_modules
    environment:
      NODE_ENV: development
    depends_on:
      - server

  db:
    container_name: lms-db
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lmsdb
    ports:
      - 5432:5432
    volumes:
      # PostgreSQLのデータを永続化
      - postgres_data:/var/lib/postgresql

  fake-gcs:
    container_name: lms-fake-gcs
    image: fsouza/fake-gcs-server
    ports:
      - 4443:4443
      - 8000:8000
    volumes:
      - gcs_data:/data
    command: ["-scheme", "both", "-backend", "memory"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 5s
      timeout: 10s
      retries: 5

  gcs-init:
    container_name: lms-gcs-init
    image: curlimages/curl:latest
    depends_on:
      fake-gcs:
        condition: service_healthy
    command: >
      sh -c "curl -X PUT http://fake-gcs:8000/dummy-storage-bucket && echo 'Bucket created successfully'"

volumes:
  node_modules:
  postgres_data:
  gcs_data:

