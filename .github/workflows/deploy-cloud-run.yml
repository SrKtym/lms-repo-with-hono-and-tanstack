# GitHub ActionsでCloud Runにデプロイするワークフロー
# 1. biome ciでリント

# 2. docker buildでバックエンドアプリケーション（Hono API Server）のビルド
# 3. artifact registryにバックエンドイメージをプッシュ(roles/artifactregistry.writerが必要）
# 4. gcloud run deployでバックエンドサービスをデプロイ(roles/run.adminが必要）

# 5. docker buildでフロントエンドアプリケーション（React + TanStack Router）のビルド
# 6. artifact registryにフロントエンドイメージをプッシュ(roles/artifactregistry.writerが必要）
# 7. gcloud run deployでフロントエンドサービスをデプロイ(roles/run.adminが必要）

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
# GCPプロジェクトID
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
# リージョン(東京)
  REGION: ${{ vars.GCP_REGION }}
# サービス名
  SERVER_SERVICE_NAME: ${{ vars.SERVER_SERVICE_NAME }}
  WEB_SERVICE_NAME: ${{ vars.WEB_SERVICE_NAME }}
# Artifact Registry
  ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}

permissions:
  id-token: write
  contents: read

jobs:
# デプロイ前のリント
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # リポジトリのソースコードを仮想環境（ランナー）にクローン
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # Biomeのセットアップ
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      # Biomeでリントを実行
      - name: Run Biome check
        run: biome ci .

# バックエンドアプリケーション（Hono API Server）のデプロイ
  deploy-server:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      id-token: write
    steps:
      # リポジトリのソースコードを仮想環境（ランナー）にクローン
      - name: Checkout code
        uses: actions/checkout@v5

      # Google Cloud認証（Workload Identity 連携）
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: 'github-actions@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'

      # Google Cloud CLIのセットアップ
      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Docker認証
      - name: Configure Docker to use gcloud CLI
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      # Dockerイメージをビルドしてプッシュ
      - name: Build and push Server image
        run: |
          IMAGE_NAME="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/lms-server:${{ github.sha }}"
          docker build -f apps/server/Dockerfile -t $IMAGE_NAME .
          docker push $IMAGE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      # GCSエミュレーターはローカル環境で使用するため、本番環境では空にする
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVER_SERVICE_NAME }} \
            --image ${{ env.IMAGE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }},NODE_ENV=production,GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }},ARCJET_KEY=${{ secrets.ARCJET_KEY }},CORS_ORIGIN=${{ secrets.CORS_ORIGIN }},RESEND_API_KEY=${{ secrets.RESEND_API_KEY }},BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }},BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GH_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }},GH_CLIENT_ID=${{ secrets.GH_CLIENT_ID }},TWITTER_CLIENT_SECRET=${{ secrets.TWITTER_CLIENT_SECRET }},TWITTER_CLIENT_ID=${{ secrets.TWITTER_CLIENT_ID }},GCS_EMULATOR_HOST=

  # フロントエンドアプリケーション（React + TanStack Router）のデプロイ
  deploy-web:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      id-token: write
    steps:
      # リポジトリのソースコードを仮想環境（ランナー）にクローン
      - name: Checkout code
        uses: actions/checkout@v5

      # Google Cloud認証（Workload Identity 連携）
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: 'github-actions@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'

      # Google Cloud CLIのセットアップ
      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Docker認証
      - name: Configure Docker to use gcloud CLI
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      # Dockerイメージをビルドしてプッシュ
      - name: Build and push Web image
        run: |
          IMAGE_NAME="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/lms-web:${{ github.sha }}"
          docker build -f apps/web/Dockerfile -t $IMAGE_NAME .
          docker push $IMAGE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      # VITE_SERVER_URLとVITE_CLIENT_URLはCloud RunのURLを設定する
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.WEB_SERVICE_NAME }} \
            --image ${{ env.IMAGE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=production,VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }},VITE_CLIENT_URL=${{ secrets.VITE_CLIENT_URL }}
