name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
# GCPプロジェクトID
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
# リージョン(東京)
  REGION: asia-northeast1
# サービス名
  SERVER_SERVICE_NAME: lms-server
  WEB_SERVICE_NAME: lms-web
# Artifact Registry
  ARTIFACT_REGISTRY: asia-northeast1-docker.pkg.dev

jobs:
# デプロイ前のリント
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome check
        run: biome ci .

# バックエンドアプリケーション（Hono API Server）のデプロイ
  deploy-server:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker to use gcloud CLI
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      - name: Build and push Server image
        run: |
          IMAGE_NAME="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/lms-server:${{ github.sha }}"
          docker build -f apps/server/Dockerfile -t $IMAGE_NAME .
          docker push $IMAGE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
      # GCSエミュレーターはローカル環境で使用するため、本番環境では空にする
        run: |
          gcloud run deploy ${{ env.SERVER_SERVICE_NAME }} \
            --image ${{ env.IMAGE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }},NODE_ENV=production,GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }},ARCJET_KEY=${{ secrets.ARCJET_KEY }},CORS_ORIGIN=${{ secrets.CORS_ORIGIN }},RESEND_API_KEY=${{ secrets.RESEND_API_KEY }},BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }},BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }},GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }},GCS_EMULATOR_HOST=

  # フロントエンドアプリケーション（React + TanStack Router）のデプロイ
  deploy-web:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker to use gcloud CLI
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      - name: Build and push Web image
        run: |
          IMAGE_NAME="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/lms-web:${{ github.sha }}"
          docker build -f apps/web/Dockerfile -t $IMAGE_NAME .
          docker push $IMAGE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
      # VITE_SERVER_URLとVITE_CLIENT_URLはCloud RunのURLを設定する
        run: |
          gcloud run deploy ${{ env.WEB_SERVICE_NAME }} \
            --image ${{ env.IMAGE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=production,VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }},VITE_CLIENT_URL=${{ secrets.VITE_CLIENT_URL }}
