# GitHub ActionsでCloudflare Pagesにデプロイするワークフロー
# 1. biome ciでリント
# 2. bun installで依存関係をインストール
# 3. bun run buildでフロントエンドアプリケーション（React + TanStack Router）をビルド
# 4. wrangler pages deployでCloudflare Pagesにデプロイ

name: Deploy Web to Cloudflare Pages

on:
  # mainブランチへのプッシュ時（フロントエンドアプリに変更があった場合）に実行
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/ui/**'
      - 'package.json'
      - 'turbo.json'
      - '.github/workflows/deploy-cloudflare.yml'

env:
  # Cloudflare Pagesのプロジェクト名
  CLOUDFLARE_PROJECT_NAME: ${{ vars.REPOSITORY }}

permissions:
  contents: read

jobs:
  # デプロイ前のリント
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # リポジトリのソースコードを仮想環境（ランナー）にクローン
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # Biomeのセットアップ
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      # Biomeでリントを実行
      - name: Run Biome check
        run: biome ci .

  # フロントエンドアプリケーション（React + TanStack Router）のデプロイ
  deploy-web:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      deployments: write
    steps:
      # リポジトリのソースコードを仮想環境（ランナー）にクローン
      - name: Checkout code
        uses: actions/checkout@v5

      # Bunのセットアップ
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 依存関係のインストール
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ビルド
      - name: Build web
        run: bun run build --filter=web
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
          VITE_CLIENT_URL: ${{ vars.VITE_CLIENT_URL }}

      # Cloudflare Pagesにデプロイ
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }}
          packageManager: bun
